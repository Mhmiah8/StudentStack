<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StudentStack | Profile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1e3a8a',
            secondary: '#0d9488',
            accent: '#f59e0b',
            background: '#f8fafc',
          },
        }
      }
    }
  </script>
</head>
<body class="bg-background text-slate-900 min-h-screen">
<nav class="w-full bg-white border-b border-slate-200">
<div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
<a class="font-bold text-primary text-xl" href="code.html">StudentStack</a>
<button class="bg-slate-100 text-slate-700 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-slate-200 transition-colors" id="profile-signout-btn" type="button">Sign Out</button>
</div>
</nav>

<main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
<section class="hidden bg-white border border-slate-200 rounded-2xl p-8" id="auth-required">
<h1 class="text-2xl font-bold mb-3">Log in required</h1>
<p class="text-slate-600 mb-6">You need to log in to view and edit your profile.</p>
<button class="bg-primary text-white px-5 py-2 rounded-lg font-semibold hover:bg-blue-800 transition-colors" id="auth-required-login-btn" type="button">Go to Home & Log In</button>
</section>

<section class="hidden" id="profile-shell">
<div class="bg-white border border-slate-200 rounded-2xl p-8 mb-6">
<h1 class="text-3xl font-bold text-slate-900 mb-2">Your Profile</h1>
<p class="text-slate-500">Manage your account details and university information.</p>
</div>

<div class="hidden px-4 py-3 rounded-lg text-sm mb-4" id="profile-status"></div>

<form class="bg-white border border-slate-200 rounded-2xl p-8 space-y-6" id="profile-form">
<div class="grid grid-cols-1 md:grid-cols-2 gap-5">
<div>
<label class="block text-sm font-semibold text-slate-700 mb-1" for="profile-email">Email</label>
<input class="w-full rounded-lg border border-slate-300 bg-slate-50 px-3 py-2" id="profile-email" readonly type="email"/>
</div>
<div>
<label class="block text-sm font-semibold text-slate-700 mb-1" for="profile-avatar">Profile Emoji</label>
<input class="w-full rounded-lg border border-slate-300 px-3 py-2" id="profile-avatar" maxlength="2" placeholder="🙂" type="text"/>
<div class="flex flex-wrap gap-2 mt-2" id="profile-avatar-presets">
<button class="px-2 py-1 rounded border border-slate-200 hover:bg-slate-50" data-emoji="🙂" type="button">🙂</button>
<button class="px-2 py-1 rounded border border-slate-200 hover:bg-slate-50" data-emoji="😎" type="button">😎</button>
<button class="px-2 py-1 rounded border border-slate-200 hover:bg-slate-50" data-emoji="🧠" type="button">🧠</button>
<button class="px-2 py-1 rounded border border-slate-200 hover:bg-slate-50" data-emoji="🚀" type="button">🚀</button>
<button class="px-2 py-1 rounded border border-slate-200 hover:bg-slate-50" data-emoji="🔥" type="button">🔥</button>
<button class="px-2 py-1 rounded border border-slate-200 hover:bg-slate-50" data-emoji="🤖" type="button">🤖</button>
</div>
</div>
<div>
<label class="block text-sm font-semibold text-slate-700 mb-1" for="profile-display-name">Display Name</label>
<input class="w-full rounded-lg border border-slate-300 px-3 py-2" id="profile-display-name" required type="text"/>
</div>
<div>
<label class="block text-sm font-semibold text-slate-700 mb-1" for="profile-university">University</label>
<input class="w-full rounded-lg border border-slate-300 px-3 py-2" id="profile-university" type="text"/>
</div>
<div>
<label class="block text-sm font-semibold text-slate-700 mb-1" for="profile-year">Year of Study</label>
<input class="w-full rounded-lg border border-slate-300 px-3 py-2" id="profile-year" placeholder="e.g. Year 2" type="text"/>
</div>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm">
<div class="bg-slate-50 rounded-lg p-4 border border-slate-200">
<p class="text-slate-500 mb-1">Role</p>
<p class="font-semibold text-slate-900" id="profile-role">USER</p>
</div>
<div class="bg-slate-50 rounded-lg p-4 border border-slate-200">
<p class="text-slate-500 mb-1">Account Created</p>
<p class="font-semibold text-slate-900" id="profile-created">—</p>
</div>
<div class="bg-slate-50 rounded-lg p-4 border border-slate-200">
<p class="text-slate-500 mb-1">Last Login</p>
<p class="font-semibold text-slate-900" id="profile-last-login">—</p>
</div>
</div>

<div class="flex justify-end">
<button class="bg-primary text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-blue-800 transition-colors" id="profile-save-btn" type="submit">Save Profile</button>
</div>
</form>
</section>
</main>

<script src="js/profile-page.js" type="module"></script>
</body>
</html>
